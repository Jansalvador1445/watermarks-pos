version: '3.8'

services:
  mongo:
    image: mongo:7
    container_name: h2o-mongo
    restart: unless-stopped
    ports:
      - '27017:27017'
    volumes:
      - mongo_data:/data/db
    environment:
      MONGO_INITDB_DATABASE: h2o-water-refilling

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: h2o-backend
    restart: unless-stopped
    ports:
      - '5000:5000'
    environment:
      NODE_ENV: production
      PORT: 5000
      MONGODB_URI: mongodb://mongo:27017/h2o-water-refilling
      JWT_ACCESS_SECRET: ${JWT_ACCESS_SECRET}
      JWT_REFRESH_SECRET: ${JWT_REFRESH_SECRET}
      CLIENT_URL: http://localhost
      COOKIE_SECURE: 'false'
    depends_on:
      - mongo
    volumes:
      - backend_uploads:/app/uploads
      - backend_backups:/app/backups
      - backend_logs:/app/logs

  web:
    build:
      context: ./web
      dockerfile: Dockerfile
    container_name: h2o-web
    restart: unless-stopped
    ports:
      - '80:80'
    depends_on:
      - backend

volumes:
  mongo_data:
  backend_uploads:
  backend_backups:
  backend_logs:
